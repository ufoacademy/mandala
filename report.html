<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건강만다라 | 프리미엄 통합분석 리포트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 15mm; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; color:#1B2E22; background:#F7FBF8; }
.page { max-width:800px; margin:0 auto; padding:24px 20px 60px; }
.toolbar { position:sticky; top:0; background:#2D6A4F; color:#fff; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; z-index:10; }
.toolbar span { font-weight:700; font-size:14px; }
.toolbar button { background:#fff; color:#2D6A4F; border:none; border-radius:8px; padding:10px 18px; font-weight:700; cursor:pointer; font-size:13px; }
@media print {
  .no-print { display:none !important; }
  body { background:#fff; }
  .page { max-width:none; padding:0; }
  .hero, .insight-card, .area-interp, .paired-section, .nutrition-card, .roadmap-row { page-break-inside:avoid; }
  .section h2 { page-break-after:avoid; }
  .page-break-before { page-break-before:always; break-before:page; }
}
.hero { background:linear-gradient(135deg,#2D6A4F,#1A4731); color:#fff; border-radius:16px; padding:18px 20px; margin-bottom:12px; }
.hero h1 { font-size:17px; line-height:1.4; margin-bottom:6px; }
.hero .greeting { font-size:11.5px; opacity:.9; line-height:1.55; }
.hero .total { font-size:11.5px; opacity:.8; margin-top:8px; }
.insight-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.insight-card { background:#F0FAF3; border-left:3px solid #52B788; border-radius:10px; padding:10px; font-size:11px; line-height:1.5; }
.section { background:#fff; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
.section h2 { font-size:15px; color:#2D6A4F; margin-bottom:10px; border-bottom:2px solid #D8F3DC; padding-bottom:6px; }
.area-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; font-size:11px; }
.area-bar-label { width:110px; flex-shrink:0; }
.area-bar-track { flex:1; background:#F0F4F1; border-radius:4px; height:8px; overflow:hidden; }
.area-bar-fill { height:100%; background:#52B788; }
.area-bar-pct { width:40px; text-align:right; flex-shrink:0; color:#4A5E52; }
.area-interp { margin-bottom:12px; }
.area-interp strong { font-size:13px; color:#1B2E22; }
.area-interp p { font-size:12px; line-height:1.7; margin-top:4px; color:#4A5E52; }
.paired-section { margin-bottom:20px; }
.paired-section:last-child { margin-bottom:0; }
.paired-section h3 { font-size:14px; color:#2D6A4F; margin-bottom:8px; }
.paired-cols { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:10px; }
.paired-cols div { font-size:12px; line-height:1.7; background:#F7FBF8; border-radius:8px; padding:10px; }
.exec-translation { font-size:12px; line-height:1.7; margin-bottom:8px; }
.exec-translation strong { color:#2D6A4F; }
.mission-box { background:#FFF3E0; border-left:3px solid #E07B39; border-radius:8px; padding:10px 12px; font-size:12px; line-height:1.7; }
.checkup-table { width:100%; border-collapse:collapse; font-size:12px; }
.checkup-table th, .checkup-table td { border-bottom:1px solid #E5EDE8; padding:8px; text-align:left; }
.radar-wrap { display:flex; justify-content:center; margin-bottom:8px; }
.nutrition-summary { font-size:12px; line-height:1.7; color:#4A5E52; margin-bottom:14px; }
.nutrition-card { background:#F7FBF8; border-left:3px solid #16A34A; border-radius:8px; padding:12px 14px; margin-bottom:10px; }
.nutrition-card:last-child { margin-bottom:0; }
.nutrition-card h4 { font-size:13px; color:#1B2E22; margin-bottom:4px; }
.nutrition-card p { font-size:12px; line-height:1.7; color:#4A5E52; margin-bottom:6px; }
.nutrition-card .evidence-source { font-size:11px; color:#16A34A; font-weight:700; }
.roadmap-row { display:flex; gap:12px; margin-bottom:9px; font-size:12px; }
.roadmap-week { width:70px; flex-shrink:0; font-weight:700; color:#2D6A4F; }
.conclusion-box { background:#F0FAF3; }
.conclusion-box p { font-size:12px; line-height:1.8; margin-bottom:10px; }
.conclusion-box p:last-child { margin-bottom:0; }
.footer-note { text-align:center; font-size:10px; color:#8AA693; margin-top:20px; }
.error-box { text-align:center; padding:80px 20px; }
.error-box h2 { font-size:18px; margin-bottom:10px; }
.error-box a { color:#2D6A4F; font-weight:700; text-decoration:underline; }
.inapp-banner { display:none; background:#FFF3E0; border-bottom:2px solid #E07B39; padding:12px 20px; font-size:12.5px; line-height:1.7; color:#7A4A1E; }
.inapp-banner.show { display:block; }
.inapp-banner strong { color:#B94A00; }
.inapp-banner button { margin-top:8px; background:#2D6A4F; color:#fff; border:none; border-radius:8px; padding:8px 14px; font-weight:700; font-size:12px; cursor:pointer; }
</style>
</head>
<body>
<div class="inapp-banner no-print" id="inappBanner">
  <strong>⚠️ PDF 저장이 안 되시나요?</strong> 카카오톡·인스타그램 등 앱 내 브라우저에서는 인쇄/PDF 기능이 지원되지 않습니다.<br>
  화면 우측 상단(또는 하단) <strong>'···' 메뉴 → 다른 브라우저로 열기(Safari/Chrome)</strong>를 선택해주세요.<br>
  <button onclick="copyReportLink()" id="copyLinkBtn">🔗 이 링크 복사하기</button>
</div>
<div class="toolbar no-print">
  <span>🌿 건강만다라 프리미엄 리포트</span>
  <button onclick="handlePrintClick()">🖨️ 인쇄 / PDF로 저장</button>
</div>
<div class="page" id="reportRoot"></div>

<script>
function isInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|Instagram|NAVER\(inapp;|FBAN|FBAV|Line\//i.test(ua);
}

function handlePrintClick() {
  if (isInAppBrowser()) {
    document.getElementById('inappBanner').classList.add('show');
    document.getElementById('inappBanner').scrollIntoView({ behavior: 'smooth' });
    return;
  }
  window.print();
}

function copyReportLink() {
  const btn = document.getElementById('copyLinkBtn');
  navigator.clipboard.writeText(window.location.href).then(() => {
    btn.textContent = '✅ 복사 완료! Safari/Chrome에 붙여넣기 하세요';
    setTimeout(() => { btn.textContent = '🔗 이 링크 복사하기'; }, 3000);
  }).catch(() => {
    btn.textContent = '복사 실패 - 주소창에서 직접 복사해주세요';
  });
}

if (isInAppBrowser()) {
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('inappBanner').classList.add('show');
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function renderError() {
  document.getElementById('reportRoot').innerHTML = `
    <div class="error-box">
      <h2>리포트 정보를 찾을 수 없습니다</h2>
      <p style="margin-top:10px;color:#4A5E52;">진단을 먼저 완료한 뒤 프리미엄 리포트를 요청해주세요.</p>
      <p style="margin-top:16px;"><a href="index.html">진단 페이지로 돌아가기</a></p>
    </div>`;
}

function renderReport(data) {
  const { report, name, areaScores, checkupSummary, totalScore } = data;
  const root = document.getElementById('reportRoot');

  const insightCards = (report.coreInsights || [])
    .map((t) => `<div class="insight-card">${escapeHtml(t)}</div>`)
    .join('');

  const areaBars = (areaScores || [])
    .map(
      (a) => `
    <div class="area-bar-row">
      <div class="area-bar-label">${escapeHtml(a.name)}</div>
      <div class="area-bar-track"><div class="area-bar-fill" style="width:${a.pctVal}%"></div></div>
      <div class="area-bar-pct">${a.pctVal}%</div>
    </div>`,
    )
    .join('');

  const areaInterpretations = (report.areaInterpretations || [])
    .map((ai) => {
      const area = (areaScores || []).find((a) => a.id === ai.areaId);
      const label = area ? area.name : `영역 ${ai.areaId}`;
      return `<div class="area-interp"><strong>${escapeHtml(label)}</strong><p>${escapeHtml(ai.summary)}</p></div>`;
    })
    .join('');

  const pairedSections = (report.pairedSections || [])
    .map(
      (p) => `
    <div class="paired-section">
      <h3>${escapeHtml(p.title)}</h3>
      <div class="paired-cols">
        <div>${escapeHtml(p.leftNarrative)}</div>
        <div>${escapeHtml(p.rightNarrative)}</div>
      </div>
      <div class="exec-translation"><strong>실행 번역</strong><br>${escapeHtml(p.executionTranslation)}</div>
      <div class="mission-box"><strong>이번 달 핵심 미션</strong><br>${escapeHtml(p.monthlyMission)}</div>
    </div>`,
    )
    .join('');

  const checkupRows = (checkupSummary || [])
    .map(
      (c) => `<tr><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.value)}${escapeHtml(c.unit)}</td><td>${escapeHtml(c.status)}</td></tr>`,
    )
    .join('');
  const checkupTable =
    checkupSummary && checkupSummary.length > 0
      ? `
    <div class="section">
      <h2>검진수치 요약</h2>
      <table class="checkup-table">
        <thead><tr><th>항목</th><th>수치</th><th>상태</th></tr></thead>
        <tbody>${checkupRows}</tbody>
      </table>
    </div>`
      : '';

  const np = report.nutritionPlan || {};
  const nutritionCards = (np.recommendations || [])
    .map(
      (r) => `
    <div class="nutrition-card">
      <h4>${escapeHtml(r.title)}</h4>
      <p>${escapeHtml(r.description)}</p>
      <div class="evidence-source">📖 근거: ${escapeHtml(r.evidenceSource)}</div>
    </div>`,
    )
    .join('');
  const nutritionSection = np.summary
    ? `
    <div class="section">
      <h2>🥗 나의 영양설계 추천</h2>
      <p class="nutrition-summary">${escapeHtml(np.summary)}</p>
      ${nutritionCards}
    </div>`
    : '';

  const roadmapRows = (report.roadmap12Week || [])
    .map((r) => `<div class="roadmap-row"><div class="roadmap-week">${escapeHtml(r.week)}</div><div>${escapeHtml(r.action)}</div></div>`)
    .join('');

  const fc = report.finalConclusion || {};

  root.innerHTML = `
    <div class="hero">
      <div style="display:inline-block;background:rgba(255,255,255,0.15);border-radius:16px;padding:4px 12px;font-size:10px;font-weight:700;margin-bottom:6px;">🎁 진단가 100,000원 상당의 프리미엄 통합분석을 무료로 제공합니다</div>
      <h1>${escapeHtml(name || '고객')}님, 건강만다라로 몸의 패턴을 읽었습니다</h1>
      <p class="greeting">${escapeHtml(report.greeting || '')}</p>
      <p class="total">건강만다라 총점 ${escapeHtml(totalScore)}/256</p>
    </div>
    <div class="insight-grid">${insightCards}</div>
    <div class="section">
      <h2>8영역 맵</h2>
      <div class="radar-wrap"><canvas id="radarCanvas" width="220" height="220"></canvas></div>
      ${areaBars}
    </div>
    <div class="section page-break-before">
      <h2>8영역 해석 요약</h2>
      ${areaInterpretations}
    </div>
    <div class="section">
      ${pairedSections}
    </div>
    ${checkupTable}
    <div class="section">
      <h2>8영역 우선순위</h2>
      <p style="font-size:12px;line-height:1.7;color:#4A5E52;">${escapeHtml(report.priorityExplanation || '')}</p>
    </div>
    ${nutritionSection}
    <div class="section">
      <h2>12주 실행 로드맵</h2>
      ${roadmapRows}
    </div>
    <div class="section conclusion-box">
      <h2>최종 결론</h2>
      <p><strong>${escapeHtml(fc.oneLineSummary || '')}</strong></p>
      <p>${escapeHtml(fc.whyStrong || '')}</p>
      <p>${escapeHtml(fc.finalProposal || '')}</p>
    </div>
    <p class="footer-note">© 2026 건강이음센터. 본 리포트는 생활습관 코칭 참고용이며 의학적 진단을 대체하지 않습니다. (저작권등록번호 C-2026-026168)</p>
    <p class="footer-note" style="margin-top:4px;">기업·기관 사용 문의: ufoacademy@naver.com</p>
  `;

  drawRadar(areaScores || []);
}

function drawRadar(areaScores){
  const canvas=document.getElementById('radarCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, r=Math.min(W,H)/2-40;
  const n=8;
  const angles=Array.from({length:n},(_,i)=>((2*Math.PI/n)*i)-Math.PI/2);

  ctx.clearRect(0,0,W,H);

  for(let level=1;level<=4;level++){
    ctx.beginPath();
    angles.forEach((angle,i)=>{
      const x=cx+Math.cos(angle)*(r*(level/4));
      const y=cy+Math.sin(angle)*(r*(level/4));
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.strokeStyle=`rgba(45,106,79,${0.1+level*0.05})`;
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='rgba(240,250,243,0.3)';
    ctx.fill();
  }

  angles.forEach(angle=>{
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*r, cy+Math.sin(angle)*r);
    ctx.strokeStyle='rgba(45,106,79,0.2)';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  ctx.beginPath();
  areaScores.forEach((a,i)=>{
    const ratio=a.score/32;
    const x=cx+Math.cos(angles[i])*r*ratio;
    const y=cy+Math.sin(angles[i])*r*ratio;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(82,183,136,0.3)';
  ctx.fill();
  ctx.strokeStyle='rgba(45,106,79,0.9)';
  ctx.lineWidth=2.5;
  ctx.stroke();

  areaScores.forEach((a,i)=>{
    const ratio=a.score/32;
    const x=cx+Math.cos(angles[i])*r*ratio;
    const y=cy+Math.sin(angles[i])*r*ratio;
    ctx.beginPath();
    ctx.arc(x,y,5,0,2*Math.PI);
    ctx.fillStyle=a.color||'#2D6A4F';
    ctx.fill();
    ctx.strokeStyle='#fff';
    ctx.lineWidth=2;
    ctx.stroke();
  });

  ctx.font='bold 12px "Noto Sans KR", sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  areaScores.forEach((a,i)=>{
    const lx=cx+Math.cos(angles[i])*(r+26);
    const ly=cy+Math.sin(angles[i])*(r+26);
    ctx.fillStyle=a.color||'#2D6A4F';
    ctx.fillText(`${a.icon||''}${a.name}`,lx,ly-5);
    ctx.fillStyle='#8AA693';
    ctx.font='10px "Noto Sans KR"';
    ctx.fillText(`${a.pctVal}%`,lx,ly+8);
    ctx.font='bold 12px "Noto Sans KR", sans-serif';
  });
}

(function init() {
  const raw = sessionStorage.getItem('premiumReport');
  if (!raw) {
    renderError();
    return;
  }
  try {
    const data = JSON.parse(raw);
    if (!data || !data.report) {
      renderError();
      return;
    }
    renderReport(data);
  } catch (e) {
    renderError();
  }
})();
</script>
</body>
</html>
